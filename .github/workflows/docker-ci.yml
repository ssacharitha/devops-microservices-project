name: Build and Push Docker Image

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract commit SHA
        id: vars
        run: echo "SHA_TAG=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Build and Push Docker Image
        run: |
          docker build -t ssacharitha/devops-project-backend:latest \
                       -t ssacharitha/devops-project-backend:${{ steps.vars.outputs.SHA_TAG }} \
                       ./backend

          docker push ssacharitha/devops-project-backend:latest
          docker push ssacharitha/devops-project-backend:${{ steps.vars.outputs.SHA_TAG }}